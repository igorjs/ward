[graph]
targets = []
all-features = false

[advisories]
db-path = "~/.cargo/advisory-db"
db-urls = ["https://github.com/rustsec/advisory-db"]
ignore = [
    # Marvin attack: RSA timing sidechannel in the `rsa` crate, with no
    # fixed version published upstream. Pulled in transitively via
    # oci-client -> jsonwebtoken (RustCrypto backend) and used only to
    # decode registry bearer-auth tokens during image pulls. Ward performs
    # anonymous pulls of public images and never holds an RSA private key,
    # so the key-recovery vector does not apply.
    "RUSTSEC-2023-0071",
    # proc-macro-error2 (RUSTSEC-2026-0173): "unmaintained" informational
    # advisory; no CVSS, no exploit. Pulled in transitively via
    # oci-client -> oci-spec -> getset, used ONLY at compile time to
    # expand derive macros. Not linked into the shipped wardd / ward /
    # ward-mcp binaries. Mirror of the entry in osv-scanner.toml; both
    # scanners maintain independent ignore lists.
    "RUSTSEC-2026-0173",
]

[licenses]
allow = [
    "AGPL-3.0-only",
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unicode-3.0",
    # Permissive, OSI-approved, FSF-libre. Pulled in via the const_format /
    # konst chain under oci-client (oci-spec).
    "Zlib",
]
confidence-threshold = 0.8

[bans]
multiple-versions = "warn"
wildcards = "allow"

[sources]
unknown-registry = "warn"
unknown-git = "warn"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = []
