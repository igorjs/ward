# Build relocatable libkrun + libkrunfw artefacts on a matrix of hosts and
# publish them to a GitHub Release tagged `libkrun-v<version>`. These bottles
# are *not* consumed at developer build time — devs install libkrun via
# `brew install slp/krun/libkrun slp/krun/libkrunfw` (see DEVELOPMENT.md).
#
# The bottles feed into the future release-packaging workflow that bundles
# the libkrun dylibs alongside `wardd` and `ward` into per-platform end-user
# artefacts (`.pkg`, `.deb`, install.sh tarballs). End users download one
# self-contained file and never run a second install command.
#
# Gating: manual trigger only. Push triggers were removed once we shifted
# the "zero install" promise to end-user packaging rather than per-dev
# build.rs (see ward-core/build.rs comment for the architecture rationale).
# Trigger this workflow when bumping `vendor/libkrun-build/version.txt`,
# or ad-hoc before cutting a ward release that needs fresh bottles.

name: vendor-libkrun

on:
  workflow_dispatch:
    inputs:
      version_override:
        description: "Override version (otherwise read from vendor/libkrun-build/version.txt)"
        required: false
        type: string

permissions:
  contents: write # required to create releases + upload artefacts

jobs:
  # ── Resolve the version once and propagate to the matrix jobs ──────
  resolve-version:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.read.outputs.version }}
    steps:
      - uses: actions/checkout@v6
      - id: read
        name: Resolve libkrun version
        run: |
          if [[ -n "${{ inputs.version_override }}" ]]; then
            VERSION="${{ inputs.version_override }}"
          else
            VERSION="$(tr -d '[:space:]' < vendor/libkrun-build/version.txt)"
          fi
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "Resolved libkrun version: ${VERSION}"

  # ── Build per-target ──────────────────────────────────────────────
  build:
    needs: [resolve-version]
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: aarch64-apple-darwin
            runner: macos-15
            install_deps: |
              # macOS Apple Silicon: Xcode CLT brings install_name_tool.
              # libkrun's build needs Rust nightly for some features.
              brew install pkg-config
          - target: x86_64-unknown-linux-gnu
            runner: ubuntu-24.04
            install_deps: |
              sudo apt-get update
              sudo apt-get install -y --no-install-recommends \
                build-essential clang patchelf pkg-config libelf-dev \
                bc bison flex
          - target: aarch64-unknown-linux-gnu
            runner: ubuntu-24.04-arm
            install_deps: |
              sudo apt-get update
              sudo apt-get install -y --no-install-recommends \
                build-essential clang patchelf pkg-config libelf-dev \
                bc bison flex
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v6

      - name: Install build dependencies
        run: ${{ matrix.install_deps }}

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build libkrun (${{ matrix.target }})
        env:
          TARGET: ${{ matrix.target }}
        run: |
          chmod +x vendor/libkrun-build/build.sh
          vendor/libkrun-build/build.sh

      - name: Record checksum
        id: checksum
        run: |
          cd vendor/libkrun-build/dist
          TARBALL="libkrun-${{ needs.resolve-version.outputs.version }}-${{ matrix.target }}.tar.gz"
          if command -v sha256sum > /dev/null 2>&1; then
            SHA="$(sha256sum "$TARBALL" | awk '{print $1}')"
          else
            SHA="$(shasum -a 256 "$TARBALL" | awk '{print $1}')"
          fi
          echo "sha=${SHA}" >> "$GITHUB_OUTPUT"
          echo "tarball=${TARBALL}" >> "$GITHUB_OUTPUT"
          echo "${SHA}  ${TARBALL}" > "${TARBALL}.sha256"
          echo "Checksum for ${TARBALL}: ${SHA}"

      - name: Upload artefact (per-target build output)
        uses: actions/upload-artifact@v4
        with:
          name: libkrun-${{ matrix.target }}
          path: |
            vendor/libkrun-build/dist/libkrun-*-${{ matrix.target }}.tar.gz
            vendor/libkrun-build/dist/libkrun-*-${{ matrix.target }}.tar.gz.sha256
          if-no-files-found: error
          retention-days: 14

  # ── Publish all targets in one release ────────────────────────────
  release:
    needs: [resolve-version, build]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Download all build artefacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Summarise checksums
        run: |
          echo "## Vendor build summary" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "Version: \`${{ needs.resolve-version.outputs.version }}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "Copy the following lines into \`vendor/libkrun-build/checksums.txt\`:" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          cat dist/*.sha256 | sort | tee -a "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"

      - name: Create or update GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: libkrun-v${{ needs.resolve-version.outputs.version }}
          name: libkrun ${{ needs.resolve-version.outputs.version }}
          body: |
            Pre-built libkrun + libkrunfw binaries for ward.

            Consumed at build time by `ward-core/build.rs`. Not intended
            for direct download — see vendor/libkrun-build/README.md.

            **Supply-chain note**: after this release publishes, the
            SHA-256 sums must be copied into `vendor/libkrun-build/
            checksums.txt` and committed before ward source releases
            depend on this version.
          files: |
            dist/libkrun-*.tar.gz
            dist/libkrun-*.tar.gz.sha256
          fail_on_unmatched_files: true
