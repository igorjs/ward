name: Lock Closed Issues & PRs

on:
  schedule:
    - cron: "0 10 1 * *"  # 1st of each month at 10am UTC
  workflow_dispatch:

permissions:
  issues: write
  pull-requests: write

jobs:
  lock:
    runs-on: ubuntu-latest
    steps:
      - uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          # Audit mode: lock-threads only hits api.github.com, so a
          # strict block-mode allowlist would also work, but audit
          # is consistent with the other low-risk utility workflows
          # (scorecard, stale, etc.) that ward consumes from this
          # module.
          egress-policy: audit
      - uses: dessant/lock-threads@89ae32b08ed1a541efecbab17912962a5e38981c # v6.0.2
        with:
          issue-inactive-days: 90
          pr-inactive-days: 30
          issue-lock-reason: "resolved"
          pr-lock-reason: "resolved"
          issue-comment: >
            This issue has been locked because it has been closed for more than 90 days
            with no further activity. Please open a new issue if the problem persists.
          pr-comment: >
            This PR has been locked because it has been closed for more than 30 days
            with no further activity. Please open a new PR if you'd like to continue this work.
