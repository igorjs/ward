name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: -Dwarnings

jobs:
  # ── Fast fail: formatting ────────────────────────────────────────────
  fmt:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@nightly
        with:
          components: rustfmt
      - name: rustfmt
        run: cargo fmt --all -- --check

  # ── Lint ─────────────────────────────────────────────────────────────
  clippy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - name: Install protoc
        run: sudo apt-get install -y protobuf-compiler
      - name: clippy
        run: cargo clippy --all-targets

  # ── Unit + integration tests ────────────────────────────────────────
  # Fast tier: ward-core unit tests (inline #[cfg(test)] modules) and
  # ward-core integration tests (tests/grpc_*.rs that spin up an in-process
  # tonic server). No subprocess management, sub-second runtime.
  test:
    needs: [clippy]
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-15]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Install protoc (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get install -y protobuf-compiler
      - name: Install protoc (macOS)
        if: runner.os == 'macOS'
        run: brew install protobuf
      - name: Install e2fsprogs (macOS)
        # mkfs.ext4 is preinstalled on Ubuntu; macOS ships nothing equivalent.
        # The volume manager shells out to mkfs.ext4 to format the disk image
        # libkrun mounts inside the microVM (ext4 regardless of host OS).
        # Homebrew installs this keg-only so the sbin path needs to land on
        # PATH explicitly via $GITHUB_PATH.
        if: runner.os == 'macOS'
        run: |
          brew install e2fsprogs
          echo "$(brew --prefix e2fsprogs)/sbin" >> "$GITHUB_PATH"
      - name: Build (libraries + binaries)
        run: cargo build --workspace
      - name: Smoke test (ward CLI responds to --version)
        # Catches link errors and broken clap setups that compile but
        # crash before any test runs the binary. Only `ward` (the CLI)
        # has a clap parser; `wardd` is a daemon that ignores argv and
        # binds its Unix socket on startup, so invoking it here would
        # hang the job. Daemon link-check is covered by the subsequent
        # e2e job which spawns wardd with a timeout via assert_cmd.
        run: ./target/debug/ward --version
      - name: Unit tests (all crates)
        run: cargo test --workspace --lib --bins
      - name: Integration tests (ward-core)
        run: cargo test -p ward-core --tests

  # ── E2E tests ───────────────────────────────────────────────────────
  # Slow tier: spawns the real wardd binary as a subprocess and runs the
  # compiled ward CLI against it. Validates user-facing behaviour
  # (exit codes, stdout, socket discovery) that the in-process tests cannot.
  # Runs on every PR but in its own job so failures here are visibly
  # distinct from cheaper test failures.
  e2e:
    needs: [clippy]
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-15]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Install protoc (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get install -y protobuf-compiler
      - name: Install protoc (macOS)
        if: runner.os == 'macOS'
        run: brew install protobuf
      - name: Install e2fsprogs (macOS)
        # e2e tests spin up the wardd binary which formats real ext4 images
        # via mkfs.ext4. Ubuntu ships e2fsprogs; macOS needs it from Homebrew
        # and the keg-only sbin appended to PATH for the daemon to find it.
        if: runner.os == 'macOS'
        run: |
          brew install e2fsprogs
          echo "$(brew --prefix e2fsprogs)/sbin" >> "$GITHUB_PATH"
      - name: Build (required so assert_cmd finds wardd and ward binaries)
        run: cargo build --workspace
      - name: E2E tests (wardd subprocess + ward CLI)
        run: cargo test -p ward-daemon --tests

  # ── libkrun feature build ────────────────────────────────────────────
  # Compiles + lints the workspace with the real libkrun backend enabled
  # on both supported host targets. Downloads the pinned libkrun bottle
  # from igorjs/ward-vendor (the same source release.yml uses) and verifies
  # it against the SHA-256 sums in vendor/libkrun-checksums.txt. Does NOT
  # boot a microVM: standard runners lack hypervisor access (no /dev/kvm
  # on Linux runners, no nested HVF on macOS runners), so this tier proves
  # FFI signatures, linking, and all non-boot logic compile on each target.
  # Real boot tests are gated behind WARD_KVM_TESTS for a future self-hosted
  # KVM runner (see ward-core/tests/krun_boot.rs).
  krunvm-build:
    needs: [clippy]
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-24.04
            target: x86_64-unknown-linux-gnu
          - os: macos-15
            target: aarch64-apple-darwin
    runs-on: ${{ matrix.os }}
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - name: Install protoc (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get install -y protobuf-compiler
      - name: Install protoc (macOS)
        if: runner.os == 'macOS'
        run: brew install protobuf
      - name: Fetch + verify libkrun bottle
        shell: bash
        run: |
          set -euo pipefail
          LIBKRUN_VERSION="$(tr -d '[:space:]' < vendor/libkrun-version.txt)"
          TARBALL="libkrun-${LIBKRUN_VERSION}-${{ matrix.target }}.tar.gz"
          mkdir -p libkrun-vendor
          gh release download "libkrun-v${LIBKRUN_VERSION}" \
            --repo igorjs/ward-vendor \
            --pattern "$TARBALL" \
            --dir libkrun-vendor
          EXPECTED="$(grep -E "^[a-f0-9]+  ${TARBALL}\$" vendor/libkrun-checksums.txt | awk '{print $1}')"
          if [[ -z "$EXPECTED" ]]; then
            echo "::error::no checksum entry for ${TARBALL} in vendor/libkrun-checksums.txt"
            exit 1
          fi
          # macOS runners may not ship coreutils' sha256sum; fall back to shasum.
          if command -v sha256sum >/dev/null 2>&1; then
            ACTUAL="$(sha256sum "libkrun-vendor/${TARBALL}" | awk '{print $1}')"
          else
            ACTUAL="$(shasum -a 256 "libkrun-vendor/${TARBALL}" | awk '{print $1}')"
          fi
          if [[ "$EXPECTED" != "$ACTUAL" ]]; then
            echo "::error::SHA-256 mismatch for ${TARBALL}: expected ${EXPECTED}, got ${ACTUAL}"
            exit 1
          fi
          mkdir -p libkrun-vendor/extracted
          tar -xzf "libkrun-vendor/${TARBALL}" -C libkrun-vendor/extracted
          PREFIX="$(pwd)/libkrun-vendor/extracted"
          echo "LIBKRUN_PREFIX=${PREFIX}" >> "$GITHUB_ENV"
          if [[ "${RUNNER_OS}" == "macOS" ]]; then
            echo "DYLD_LIBRARY_PATH=${PREFIX}/lib" >> "$GITHUB_ENV"
          else
            echo "LD_LIBRARY_PATH=${PREFIX}/lib" >> "$GITHUB_ENV"
          fi
      - name: Build (--features krunvm)
        run: cargo build --workspace --features ward-core/krunvm
      - name: Clippy (--features krunvm)
        run: cargo clippy --all-targets --features ward-core/krunvm -- -D warnings

  # ── MSRV (minimum supported Rust version) ───────────────────────────
  # Reads rust-version from Cargo.toml; no extra tooling needed.
  msrv:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Read MSRV from Cargo.toml
        id: msrv
        run: |
          MSRV=$(sed -n 's/^rust-version *= *"\(.*\)"/\1/p' Cargo.toml)
          echo "version=$MSRV" >> "$GITHUB_OUTPUT"
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ steps.msrv.outputs.version }}
      - uses: Swatinem/rust-cache@v2
      - name: Install protoc
        run: sudo apt-get install -y protobuf-compiler
      - name: Check MSRV compiles
        run: cargo check --all-targets

  # ── Supply chain audit ───────────────────────────────────────────────
  deny:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-deny
      - name: cargo deny
        run: cargo deny check

  # ── Code coverage ───────────────────────────────────────────────────
  # Uses cargo-llvm-cov (LLVM source-based instrumentation) which is the
  # most accurate coverage tool for Rust and what the Rust project itself
  # uses. Covers unit tests + ward-core integration tests; E2E coverage
  # would require instrumenting subprocesses, deferred for now.
  #
  # Output appears on the workflow run page as a Job Summary so the
  # coverage delta is visible on every PR without an external service.
  # The lcov report is also uploaded as an artifact for offline analysis.
  coverage:
    needs: [clippy]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: llvm-tools-preview
      - uses: Swatinem/rust-cache@v2
      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-llvm-cov
      - name: Install protoc
        run: sudo apt-get install -y protobuf-compiler
      - name: Run tests with coverage instrumentation
        # --no-report runs the test suite under coverage but defers report
        # generation. This lets us emit multiple output formats (lcov for
        # artifacts, text summary for the Job Summary) from a single test
        # run, rather than recompiling and re-running for each format.
        run: |
          cargo llvm-cov clean --workspace
          cargo llvm-cov \
            --no-report \
            --workspace \
            --exclude ward-daemon \
            --lib \
            --tests
      - name: Generate lcov report
        run: cargo llvm-cov report --lcov --output-path lcov.info
      - name: Generate text summary
        # --summary-only emits a per-file + total table to stdout. We
        # capture it both as a file (for the Job Summary block below) and
        # echo it so the raw output is visible in the CI log.
        run: cargo llvm-cov report --summary-only | tee coverage-summary.txt
      - name: Write GitHub Job Summary
        run: |
          {
            echo "## Code Coverage"
            echo ""
            echo "Tool: \`cargo-llvm-cov\` (LLVM source-based instrumentation)"
            echo "Scope: unit + ward-core integration tests (E2E excluded)"
            echo ""
            echo '```'
            cat coverage-summary.txt
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"
      - name: Upload lcov report
        uses: actions/upload-artifact@v7
        with:
          name: coverage-lcov
          path: lcov.info
          retention-days: 14
