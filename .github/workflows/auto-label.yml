name: Auto Label PRs

on:
  pull_request_target:
    types: [opened, synchronize]

permissions:
  pull-requests: write
  contents: read
  issues: write

jobs:
  label:
    runs-on: ubuntu-latest
    steps:
      - uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: block
          # github.com:443 needed by actions/checkout for the git
          # protocol; objects.githubusercontent.com for the action
          # download path. Without these the next step fails with
          # "Failed to connect to github.com port 443".
          allowed-endpoints: >
            api.github.com:443
            github.com:443
            objects.githubusercontent.com:443
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          ref: main

      - name: Ensure labels exist and apply
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');
            const pr = context.payload.pull_request;

            // ── Ensure all labels exist with correct colors ──────
            const definitions = JSON.parse(fs.readFileSync('.github/labels.json', 'utf-8'));
            const existing = await github.rest.issues.listLabelsForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              per_page: 100,
            });
            const existingMap = new Map(existing.data.map(l => [l.name, l]));

            for (const def of definitions) {
              const current = existingMap.get(def.name);
              if (!current) {
                await github.rest.issues.createLabel({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  name: def.name,
                  description: def.description,
                  color: def.color,
                });
                core.info(`Created label: ${def.name}`);
              } else if (current.color !== def.color || current.description !== def.description) {
                await github.rest.issues.updateLabel({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  name: def.name,
                  description: def.description,
                  color: def.color,
                });
                core.info(`Updated label: ${def.name}`);
              }
            }

            // ── Determine labels to apply ────────────────────────
            const labels = new Set();

            // Size
            const { data: files } = await github.rest.pulls.listFiles({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: pr.number,
              per_page: 100,
            });

            const totalChanges = files.reduce((sum, f) => sum + f.additions + f.deletions, 0);

            if (totalChanges < 10) labels.add('size:xs');
            else if (totalChanges < 50) labels.add('size:s');
            else if (totalChanges < 250) labels.add('size:m');
            else if (totalChanges < 1000) labels.add('size:l');
            else labels.add('size:xl');

            // Module (by file path)
            for (const file of files) {
              const p = file.filename;
              if (p.startsWith('src/')) labels.add('feat');
              if (p.startsWith('tests/')) labels.add('test');
              if (p.startsWith('docs/') || p.endsWith('.md')) labels.add('docs');
              if (p.startsWith('.github/workflows/')) labels.add('ci');
            }

            // Type (by PR title)
            const title = pr.title.toLowerCase();
            if (title.startsWith('feat')) labels.add('feat');
            if (title.startsWith('fix')) labels.add('fix');
            if (title.startsWith('docs')) labels.add('docs');
            if (title.startsWith('test')) labels.add('test');
            if (title.startsWith('ci')) labels.add('ci');
            if (title.startsWith('refactor')) labels.add('refactor');
            if (title.startsWith('perf')) labels.add('perf');
            if (title.startsWith('chore')) labels.add('chore');
            if (title.includes('breaking') || title.includes('BREAKING')) labels.add('breaking');

            // ── Apply labels ─────────────────────────────────────
            // Remove stale size labels
            const sizeLabels = ['size:xs', 'size:s', 'size:m', 'size:l', 'size:xl'];
            const currentLabels = pr.labels.map(l => l.name);
            for (const sl of sizeLabels) {
              if (currentLabels.includes(sl) && !labels.has(sl)) {
                await github.rest.issues.removeLabel({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: pr.number,
                  name: sl,
                }).catch(() => {});
              }
            }

            if (labels.size > 0) {
              await github.rest.issues.addLabels({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: pr.number,
                labels: [...labels],
              });
              core.info(`Applied labels: ${[...labels].join(', ')}`);
            }
