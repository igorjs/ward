# Build per-target ward release artefacts on a version tag push and
# publish them to a GitHub Release. Consumed by:
#
#   - install.sh (curl -fsSL https://raw.githubusercontent.com/igorjs/ward/main/install.sh | bash)
#   - homebrew-ward tap (formula points at the macOS arm64 tarball)
#   - Linux .deb packaging (future job, gated on GPG secret being set)
#
# Goal: a fresh user runs install.sh, gets a working `ward` + `wardd`
# binary, and never installs anything else. The libkrun dependency
# (when --features krunvm is enabled) is bundled inside the archive
# next to the binaries via rpath; the stub backend ships when
# the feature is off.
#
# Gating: tag push only. `v*` semver tags trigger the full matrix.
# Manual workflow_dispatch also supported for testing without cutting
# a tag (uploads under a `dev-<sha>` release).

name: release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      include_libkrun:
        description: "Bundle libkrun bottles from igorjs/libkrun-builds (requires a libkrun-v<version> release there)"
        required: false
        default: false
        type: boolean

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  # ── Resolve version + decide build features once ───────────────────
  resolve:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.r.outputs.version }}
      tag: ${{ steps.r.outputs.tag }}
      include_libkrun: ${{ steps.r.outputs.include_libkrun }}
    steps:
      - uses: step-security/harden-runner@ab7a9404c0f3da075243ca237b5fac12c98deaa5 # v2
        with:
          egress-policy: block
          # Allowlist covers GitHub API + git transport, Rust toolchain
          # + cargo registry, apt + brew (for protoc), and the sigstore
          # endpoints required by actions/attest-build-provenance
          # (fulcio for cert issuance, rekor for the transparency log,
          # tuf-repo-cdn for trust roots).
          allowed-endpoints: >
            api.github.com:443
            github.com:443
            objects.githubusercontent.com:443
            release-assets.githubusercontent.com:443
            codeload.github.com:443
            static.rust-lang.org:443
            static.crates.io:443
            index.crates.io:443
            crates.io:443
            archive.ubuntu.com:80
            security.ubuntu.com:80
            esm.ubuntu.com:443
            motd.ubuntu.com:443
            ppa.launchpadcontent.net:443
            azure.archive.ubuntu.com:80
            packages.microsoft.com:443
            formulae.brew.sh:443
            ghcr.io:443
            pkg-containers.githubusercontent.com:443
            fulcio.sigstore.dev:443
            rekor.sigstore.dev:443
            tuf-repo-cdn.sigstore.dev:443
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - id: r
        run: |
          if [[ "${{ github.event_name }}" == "push" ]]; then
            TAG="${GITHUB_REF##refs/tags/}"
            VERSION="${TAG#v}"
            INCLUDE_LIBKRUN="true"
          else
            # workflow_dispatch — synthesise a dev tag.
            SHORT_SHA="$(echo ${{ github.sha }} | cut -c1-7)"
            TAG="dev-${SHORT_SHA}"
            VERSION="0.0.0-${SHORT_SHA}"
            INCLUDE_LIBKRUN="${{ inputs.include_libkrun }}"
          fi
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "include_libkrun=${INCLUDE_LIBKRUN}" >> "$GITHUB_OUTPUT"
          echo "Resolved: tag=${TAG} version=${VERSION} libkrun=${INCLUDE_LIBKRUN}"

  # ── Build per target ───────────────────────────────────────────────
  build:
    needs: [resolve]
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: aarch64-apple-darwin
            runner: macos-15
            dylib_ext: dylib
          - target: x86_64-unknown-linux-gnu
            runner: ubuntu-24.04
            dylib_ext: so
          - target: aarch64-unknown-linux-gnu
            runner: ubuntu-24.04-arm
            dylib_ext: so
    runs-on: ${{ matrix.runner }}
    # SEC-012: SLSA build provenance requires OIDC token + write access
    # to the attestation API. Scoped to this job so the publish job
    # (which only needs `contents: write`) doesn't inherit them.
    permissions:
      contents: read
      id-token: write
      attestations: write
    steps:
      - uses: step-security/harden-runner@ab7a9404c0f3da075243ca237b5fac12c98deaa5 # v2
        with:
          egress-policy: block
          # Allowlist covers GitHub API + git transport, Rust toolchain
          # + cargo registry, apt + brew (for protoc), and the sigstore
          # endpoints required by actions/attest-build-provenance
          # (fulcio for cert issuance, rekor for the transparency log,
          # tuf-repo-cdn for trust roots).
          allowed-endpoints: >
            api.github.com:443
            github.com:443
            objects.githubusercontent.com:443
            release-assets.githubusercontent.com:443
            codeload.github.com:443
            static.rust-lang.org:443
            static.crates.io:443
            index.crates.io:443
            crates.io:443
            archive.ubuntu.com:80
            security.ubuntu.com:80
            esm.ubuntu.com:443
            motd.ubuntu.com:443
            ppa.launchpadcontent.net:443
            azure.archive.ubuntu.com:80
            packages.microsoft.com:443
            formulae.brew.sh:443
            ghcr.io:443
            pkg-containers.githubusercontent.com:443
            fulcio.sigstore.dev:443
            rekor.sigstore.dev:443
            tuf-repo-cdn.sigstore.dev:443
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Install protoc
        run: |
          if [[ "$RUNNER_OS" == "Linux" ]]; then
            sudo apt-get update
            # libprotobuf-dev brings the well-known proto files
            # (google/protobuf/empty.proto, timestamp.proto, etc.) that
            # protobuf-compiler alone does not install on Ubuntu 24.04
            # under --no-install-recommends. Without them, prost-build
            # fails with "File not found" on the google.protobuf imports
            # in ward.proto.
            sudo apt-get install -y --no-install-recommends \
              protobuf-compiler libprotobuf-dev
          else
            brew install protobuf
          fi

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          shared-key: release-${{ matrix.target }}

      # When libkrun bundling is requested, fetch the matching bottle
      # from the libkrun-builds repo (cross-repo gh release download) and
      # verify against checksums pinned locally in this repo. Skipped
      # on stub builds.
      - name: Fetch libkrun bottle
        if: needs.resolve.outputs.include_libkrun == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          LIBKRUN_VERSION="$(tr -d '[:space:]' < vendor/libkrun-version.txt)"
          TARBALL="libkrun-${LIBKRUN_VERSION}-${{ matrix.target }}.tar.gz"
          mkdir -p libkrun-vendor
          gh release download "libkrun-v${LIBKRUN_VERSION}" \
            --repo igorjs/libkrun-builds \
            --pattern "$TARBALL" \
            --pattern "${TARBALL}.sha256" \
            --dir libkrun-vendor
          # Verify the bottle hash matches the checksum pinned in ward.
          # Pinning locally (rather than trusting the .sha256 sidecar
          # from libkrun-builds) means a compromise of libkrun-builds cannot
          # silently inject a different binary into ward releases.
          EXPECTED="$(grep -E "^[a-f0-9]+  ${TARBALL}\$" vendor/libkrun-checksums.txt | awk '{print $1}')"
          if [[ -z "$EXPECTED" ]]; then
            echo "::error::no checksum entry for ${TARBALL} in vendor/libkrun-checksums.txt"
            exit 1
          fi
          if command -v sha256sum > /dev/null; then
            ACTUAL="$(sha256sum "libkrun-vendor/${TARBALL}" | awk '{print $1}')"
          else
            ACTUAL="$(shasum -a 256 "libkrun-vendor/${TARBALL}" | awk '{print $1}')"
          fi
          if [[ "$EXPECTED" != "$ACTUAL" ]]; then
            echo "::error::SHA-256 mismatch for ${TARBALL}: expected ${EXPECTED}, got ${ACTUAL}"
            exit 1
          fi
          # Extract for linking; the bottle layout is `lib/`, `include/`,
          # and `lib/pkgconfig/libkrun.pc` per build.sh.
          mkdir -p libkrun-vendor/extracted
          tar -xzf "libkrun-vendor/${TARBALL}" -C libkrun-vendor/extracted
          # Rewrite the placeholder prefix in libkrun.pc to the absolute
          # extracted path so pkg-config + krun-sys find it.
          PREFIX="$(pwd)/libkrun-vendor/extracted"
          sed -i.bak "s|__VENDOR_PREFIX__|${PREFIX}|" \
            "libkrun-vendor/extracted/lib/pkgconfig/libkrun.pc"
          rm "libkrun-vendor/extracted/lib/pkgconfig/libkrun.pc.bak"
          echo "PKG_CONFIG_PATH=${PREFIX}/lib/pkgconfig" >> "$GITHUB_ENV"
          echo "LIBKRUN_PREFIX=${PREFIX}" >> "$GITHUB_ENV"
          # On macOS, bindgen needs libclang. Xcode CLT provides it but
          # not in a path bindgen searches by default.
          if [[ "$RUNNER_OS" == "macOS" ]]; then
            echo "LIBCLANG_PATH=/Library/Developer/CommandLineTools/usr/lib" >> "$GITHUB_ENV"
          fi

      - name: Build (stub backend)
        if: needs.resolve.outputs.include_libkrun != 'true'
        run: |
          cargo build --release --workspace --target ${{ matrix.target }}

      - name: Build (with libkrun)
        if: needs.resolve.outputs.include_libkrun == 'true'
        run: |
          cargo build --release --workspace --target ${{ matrix.target }} --features ward-core/krunvm

      - name: Stage archive
        run: |
          VERSION="${{ needs.resolve.outputs.version }}"
          TARGET="${{ matrix.target }}"
          STAGE="ward-${VERSION}-${TARGET}"
          mkdir -p "${STAGE}/bin" "${STAGE}/lib"
          cp "target/${TARGET}/release/wardd" "${STAGE}/bin/"
          cp "target/${TARGET}/release/ward" "${STAGE}/bin/"
          cp LICENSE "${STAGE}/" 2>/dev/null || true
          cp README.md "${STAGE}/" 2>/dev/null || true
          if [[ "${{ needs.resolve.outputs.include_libkrun }}" == "true" ]]; then
            cp "${LIBKRUN_PREFIX}/lib/libkrun.${{ matrix.dylib_ext }}"* "${STAGE}/lib/" 2>/dev/null || true
            cp "${LIBKRUN_PREFIX}/lib/libkrunfw.${{ matrix.dylib_ext }}"* "${STAGE}/lib/" 2>/dev/null || true
          fi
          tar -czf "${STAGE}.tar.gz" "${STAGE}"
          # Cross-platform SHA-256.
          if command -v sha256sum > /dev/null; then
            sha256sum "${STAGE}.tar.gz" > "${STAGE}.tar.gz.sha256"
          else
            shasum -a 256 "${STAGE}.tar.gz" > "${STAGE}.tar.gz.sha256"
          fi
          ls -la "${STAGE}.tar.gz" "${STAGE}.tar.gz.sha256"

      # SEC-012: emit an in-toto SLSA build-provenance attestation for
      # the release tarball. Sigstore signs the attestation with an
      # OIDC-issued ephemeral key and records it in the public Rekor
      # transparency log. End users (and install.sh, after the
      # follow-up patch) verify with `gh attestation verify <file>
      # --owner igorjs`. Defeats compromised-release attacks that the
      # same-Release SHA-256 sidecar can't.
      - name: Attest build provenance
        uses: actions/attest-build-provenance@977bb373ede98d70efdf65b84cb5f73e068dcc2a # v3
        with:
          subject-path: |
            ward-*-${{ matrix.target }}.tar.gz

      - name: Upload artefact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: ward-${{ matrix.target }}
          path: |
            ward-*-${{ matrix.target }}.tar.gz
            ward-*-${{ matrix.target }}.tar.gz.sha256
          if-no-files-found: error
          retention-days: 14

  # ── Combine per-target SHA-256 hashes into one base64 string ─────
  # The SLSA L3 reusable workflow takes a single `base64-subjects`
  # input listing every artifact hash. GitHub Actions matrix outputs
  # cannot fan back in (only the last matrix leg's outputs survive),
  # so we download each leg's `.sha256` sidecar, concatenate, and
  # base64-encode in this dedicated job. The resulting string is the
  # canonical list of subjects the L3 generator will attest to.
  combine_hashes:
    needs: [build]
    runs-on: ubuntu-latest
    outputs:
      hashes: ${{ steps.combine.outputs.hashes }}
    steps:
      - uses: step-security/harden-runner@ab7a9404c0f3da075243ca237b5fac12c98deaa5 # v2
        with:
          egress-policy: block
          # GitHub API + artifact storage only; this job has no source
          # checkout, no toolchain install, no registry calls.
          allowed-endpoints: >
            api.github.com:443
            github.com:443
            objects.githubusercontent.com:443
            release-assets.githubusercontent.com:443
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          path: dist
          merge-multiple: true
      - id: combine
        run: |
          set -euo pipefail
          # Re-emit the hashes in `sha256  filename` form (the format the
          # SLSA generator accepts) by stripping any leading directory
          # path the upload-artifact path produced.
          ( cd dist && cat ./*.sha256 | awk '{print $1"  "$NF}' ) > all-hashes.txt
          echo "::group::Subject hashes attested"
          cat all-hashes.txt
          echo "::endgroup::"
          # base64 -w0 not available on macOS, but this job runs on
          # ubuntu-latest so the GNU coreutils flag works.
          echo "hashes=$(base64 -w0 all-hashes.txt)" >> "$GITHUB_OUTPUT"

  # ── SLSA Build L3 provenance via the framework's reusable workflow
  # Runs in an isolated job context the caller workflow (this file)
  # cannot inject into, which is what closes the L2 -> L3 gap. The
  # caller only contributes the artifact hashes; the build environment
  # the attestation describes is the reusable workflow's own runner,
  # not ours. End users verify with either:
  #   gh attestation verify <file> --owner igorjs
  #   slsa-verifier verify-artifact --provenance-path <intoto>
  #     --source-uri github.com/igorjs/ward <file>
  slsa_provenance:
    needs: [resolve, combine_hashes]
    # Permissions per slsa-framework/slsa-github-generator docs:
    # id-token for sigstore OIDC, contents:write to attach the
    # attestation to the release, actions:read so the generator can
    # read the calling workflow's metadata for the provenance subject.
    permissions:
      id-token: write
      contents: write
      actions: read
    uses: slsa-framework/slsa-github-generator/.github/workflows/generator_generic_slsa3.yml@f7dd8c54c2067bafc12ca7a55595d5ee9b75204a # v2.1.0
    with:
      base64-subjects: ${{ needs.combine_hashes.outputs.hashes }}
      upload-assets: true
      upload-tag-name: ${{ needs.resolve.outputs.tag }}
      # `provenance-name` intentionally omitted: a custom value here
      # breaks the generator's internal secure-download composite (the
      # downstream UNTRUSTED_PATH ends up empty, softprops then creates
      # the release with `files: ""` and 0 attestation assets). The
      # default name is `<workflow-name>.intoto.jsonl`, which the
      # internal pipeline knows how to find.

  # ── Publish a single release with every per-target tarball ────────
  publish:
    needs: [resolve, build, slsa_provenance]
    runs-on: ubuntu-latest
    steps:
      - uses: step-security/harden-runner@ab7a9404c0f3da075243ca237b5fac12c98deaa5 # v2
        with:
          egress-policy: block
          # Allowlist covers GitHub API + git transport, Rust toolchain
          # + cargo registry, apt + brew (for protoc), and the sigstore
          # endpoints required by actions/attest-build-provenance
          # (fulcio for cert issuance, rekor for the transparency log,
          # tuf-repo-cdn for trust roots).
          allowed-endpoints: >
            api.github.com:443
            github.com:443
            objects.githubusercontent.com:443
            release-assets.githubusercontent.com:443
            codeload.github.com:443
            static.rust-lang.org:443
            static.crates.io:443
            index.crates.io:443
            crates.io:443
            archive.ubuntu.com:80
            security.ubuntu.com:80
            esm.ubuntu.com:443
            motd.ubuntu.com:443
            ppa.launchpadcontent.net:443
            azure.archive.ubuntu.com:80
            packages.microsoft.com:443
            formulae.brew.sh:443
            ghcr.io:443
            pkg-containers.githubusercontent.com:443
            fulcio.sigstore.dev:443
            rekor.sigstore.dev:443
            tuf-repo-cdn.sigstore.dev:443
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Download all artefacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          path: dist
          merge-multiple: true

      - name: Summarise release contents
        run: |
          {
            echo "## Release ${{ needs.resolve.outputs.tag }}"
            echo ""
            echo "**Artefacts** (paste into install.sh's CHECKSUMS table):"
            echo ""
            echo '```'
            cat dist/*.sha256 | sort
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Create or update GitHub Release
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda # v3
        with:
          tag_name: ${{ needs.resolve.outputs.tag }}
          name: ward ${{ needs.resolve.outputs.version }}
          body: |
            Pre-built ward binaries. Install with:

            ```sh
            curl -fsSL https://raw.githubusercontent.com/igorjs/ward/main/install.sh | bash
            ```

            Or download a tarball directly and extract:

            ```sh
            tar -xzf ward-${{ needs.resolve.outputs.version }}-<target>.tar.gz
            ./ward-${{ needs.resolve.outputs.version }}-<target>/bin/ward --help
            ```

            ## Supported targets

            | Target                          | Backend                                |
            | ------------------------------- | -------------------------------------- |
            | `aarch64-apple-darwin`          | libkrun (HVF) when bundled, stub else  |
            | `x86_64-unknown-linux-gnu`      | libkrun (KVM) when bundled, stub else  |
            | `aarch64-unknown-linux-gnu`     | libkrun (KVM) when bundled, stub else  |
          files: |
            dist/ward-*.tar.gz
            dist/ward-*.tar.gz.sha256
          fail_on_unmatched_files: true
          prerelease: ${{ contains(needs.resolve.outputs.tag, 'dev-') }}
