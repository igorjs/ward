name: ruleset-apply

# Full ruleset-as-code: applies `.github/expected-ruleset.json` to the
# live `main` ruleset on every merge that touches the baseline. The
# baseline becomes the source of truth — any manual UI edit that
# diverges from it will be overwritten on the next push that updates
# the JSON.
#
# Workflow trigger discipline:
#   - push to main with .github/expected-ruleset.json changed
#   - workflow_dispatch for manual application (lets you re-assert
#     the baseline without committing a no-op change)
#
# Pairs with ruleset-drift.yml: drift weekly-alerts on UI changes
# that bypass this workflow; apply-on-merge enforces the JSON on PRs
# that touch it. Together: UI changes get noticed, JSON changes get
# applied.
#
# Token scope: `Administration: write` is required to PUT a ruleset.
# Scoped to this job only, NOT workflow-wide, so the harden-runner
# step (no admin access needed) doesn't inherit it.

on:
  push:
    branches: [main]
    paths:
      - ".github/expected-ruleset.json"
      - ".github/workflows/ruleset-apply.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  apply:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      # Required to PUT rulesets via the REST API.
      administration: write
    env:
      REPO: ${{ github.repository }}
    steps:
      - uses: step-security/harden-runner@ab7a9404c0f3da075243ca237b5fac12c98deaa5 # v2
        with:
          egress-policy: block
          allowed-endpoints: >
            api.github.com:443
            github.com:443
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Validate baseline JSON
        run: |
          set -euo pipefail
          if ! jq empty .github/expected-ruleset.json 2>/dev/null; then
            echo "::error::.github/expected-ruleset.json is not valid JSON"
            exit 1
          fi
          # Sanity-check required top-level fields are present.
          for field in name target enforcement rules; do
            if ! jq -e ".$field" .github/expected-ruleset.json > /dev/null; then
              echo "::error::expected-ruleset.json missing required field: $field"
              exit 1
            fi
          done
          # Sanity-check the rule set we expect to keep — any apply that
          # removes one of these is almost certainly a mistake.
          for required_rule in required_signatures pull_request required_status_checks; do
            if ! jq -e --arg t "$required_rule" '.rules[] | select(.type == $t)' \
                 .github/expected-ruleset.json > /dev/null; then
              echo "::error::expected-ruleset.json missing rule of type: $required_rule"
              echo "::error::Refusing to apply a baseline that would relax core protections."
              exit 1
            fi
          done
          echo "Baseline JSON validated."

      - name: Apply ruleset
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          # Resolve by name (survives ID changes from a ruleset rebuild).
          RULESET_ID=$(gh api "repos/$REPO/rulesets" \
            --jq '.[] | select(.name == "main") | .id')

          if [ -z "$RULESET_ID" ]; then
            echo "No existing ruleset named 'main'; creating from baseline."
            gh api -X POST "repos/$REPO/rulesets" \
              --input .github/expected-ruleset.json \
              > /dev/null
            echo "Ruleset created."
          else
            echo "Updating ruleset $RULESET_ID (named 'main') from baseline."
            gh api -X PUT "repos/$REPO/rulesets/$RULESET_ID" \
              --input .github/expected-ruleset.json \
              > /dev/null
            echo "Ruleset updated."
          fi

      - name: Verify live ruleset now matches baseline
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          RULESET_ID=$(gh api "repos/$REPO/rulesets" \
            --jq '.[] | select(.name == "main") | .id')
          # Same normalising projection as ruleset-drift.yml so an
          # apply followed by a drift check is internally consistent.
          gh api "repos/$REPO/rulesets/$RULESET_ID" --jq '{
            name,
            target,
            enforcement,
            conditions,
            bypass_actors: (.bypass_actors | sort_by(.actor_type, .actor_id)),
            rules: (.rules | sort_by(.type))
          }' | jq . > applied.json

          if ! diff -u .github/expected-ruleset.json applied.json; then
            echo ""
            echo "::error::Live ruleset does not match baseline after apply."
            echo "::error::The PUT was accepted but produced a different state."
            echo "::error::This usually means the JSON has a field GitHub silently"
            echo "::error::rewrote (e.g., enum normalisation). Inspect the diff."
            exit 1
          fi
          echo "Live ruleset matches baseline."
