name: Stale Issues & PRs

on:
  schedule:
    - cron: "0 9 1 * *"  # 1st of each month at 9am UTC
  workflow_dispatch:

permissions:
  issues: write
  pull-requests: write

jobs:
  stale:
    runs-on: ubuntu-latest
    steps:
      - uses: step-security/harden-runner@ab7a9404c0f3da075243ca237b5fac12c98deaa5 # v2
        with:
          egress-policy: block
          allowed-endpoints: >
            api.github.com:443
      - uses: actions/stale@eb5cf3af3ac0a1aa4c9c45633dd1ae542a27a899 # v10
        with:
          stale-issue-message: >
            This issue has been automatically marked as stale because it has not had
            activity in the last 60 days. It will be closed in 14 days if no further
            activity occurs. If this issue is still relevant, please comment to keep
            it open.
          stale-pr-message: >
            This pull request has been automatically marked as stale because it has not had
            activity in the last 30 days. It will be closed in 14 days if no further
            activity occurs. If this PR is still in progress, please comment or push
            new commits to keep it open.
          close-issue-message: "This issue was closed because it has been stale for 14 days with no activity."
          close-pr-message: "This PR was closed because it has been stale for 14 days with no activity."
          days-before-issue-stale: 60
          days-before-pr-stale: 30
          days-before-issue-close: 14
          days-before-pr-close: 14
          stale-issue-label: "stale"
          stale-pr-label: "stale"
          exempt-issue-labels: "bug,enhancement,help wanted"
          exempt-pr-labels: "breaking"
