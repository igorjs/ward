# Managed by repo-config. Direct edits are overwritten on the next `terraform apply`.
#
# Dependabot version-update schedule. `monthly` runs in the first week of the
# month (GitHub does not support pinning to a specific day number). Patch and
# minor PRs are auto-merged by .github/workflows/dependabot-auto-merge.yml;
# major-version bumps require manual review. PRs are grouped to minimise noise.
#
# When dependabot_version_updates = false only the file header is written;
# GitHub's automatic security updates (enabled via the repo setting) still run
# without any entry here.

version: 2

updates:
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "monthly"
    groups:
      all-github-actions:
        patterns: ["*"]
    commit-message:
      prefix: "chore(deps)"
    open-pull-requests-limit: 5

  - package-ecosystem: "cargo"
    directory: "/"
    schedule:
      interval: "monthly"
    groups:
      all-cargo:
        patterns: ["*"]
    commit-message:
      prefix: "chore(deps)"
    open-pull-requests-limit: 10
